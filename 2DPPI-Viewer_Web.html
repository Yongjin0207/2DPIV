<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<meta name="2dppiviewer-origin" content="web-app"/>
<title>2DPPI-Viewer Web</title>
<style>
  html, body {
    margin: 0;
    height: 100%;
    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
    background: #f5f6f8;
    color: #222;
  }
  #app {
    height: 100%;
    display: flex;
    flex-direction: column;
  }
  #bar {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    padding: 10px 12px;
    border-bottom: 1px solid #d9dde3;
    background: rgba(255,255,255,0.95);
    backdrop-filter: blur(6px);
    position: sticky;
    top: 0;
    z-index: 10;
  }
  #title {
    font-weight: 900;
    letter-spacing: .2px;
    margin-right: 8px;
  }
  .btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 36px;
    padding: 0 12px;
    border: 1px solid #d2d6dc;
    border-radius: 10px;
    background: #fff;
    cursor: pointer;
    user-select: none;
    font-size: 14px;
  }
  .btn:hover {
    background: #f7f8fa;
  }
  #status {
    font-size: 13px;
    color: #4b5563;
    min-height: 18px;
  }
  #frameWrap {
    flex: 1;
    min-height: 0;
    background: #e9edf2;
  }
  #iframe {
    width: 100%;
    height: 100%;
    border: 0;
    background: #fff;
  }
  #dropHint {
    display: flex;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 0;
    padding: 24px;
  }
  #dropCard {
    max-width: 640px;
    width: min(92vw, 640px);
    border: 2px dashed #c9d0d9;
    border-radius: 18px;
    background: rgba(255,255,255,0.92);
    padding: 28px 24px;
    text-align: center;
    box-shadow: 0 12px 30px rgba(0,0,0,0.06);
  }
  #dropCard h1 {
    margin: 0 0 10px;
    font-size: 22px;
  }
  #dropCard p {
    margin: 0;
    line-height: 1.5;
    color: #4b5563;
  }
  #dropCard .row {
    display: flex;
    gap: 10px;
    justify-content: center;
    flex-wrap: wrap;
    margin-top: 18px;
  }
  .hidden {
    display: none !important;
  }
  @media (max-width: 640px) {
    #bar {
      padding: 8px;
      gap: 8px;
    }
    .btn {
      min-height: 34px;
      font-size: 13px;
      padding: 0 10px;
    }
    #title {
      width: 100%;
    }
    #dropCard h1 {
      font-size: 20px;
    }
  }
</style>
</head>
<body>
<div id="app">
  <div id="bar">
    <div id="title">2DPPI-Viewer Web</div>
    <input id="fileOpen" type="file" accept=".drw,.html,text/html" class="hidden">
    <div class="btn" id="btnOpen">Open .drw or .html</div>
    <div class="btn" id="btnSave">Save HTML</div>
    <div id="status">Ready</div>
  </div>
  <div id="dropHint">
    <div id="dropCard">
      <h1>Open a .drw file</h1>
      <p>Upload a LigPlot+ .drw file to generate the viewer in the browser, or open a saved .html viewer file again later.</p>
      <div class="row">
        <div class="btn" id="btnOpen2">Open .drw or .html</div>
      </div>
    </div>
  </div>
  <div id="frameWrap" class="hidden">
    <iframe id="iframe" title="2DPPI-Viewer"></iframe>
  </div>
</div>

<script>
const VIEWER_TEMPLATE = "<!doctype html>\n<html lang=\"en\">\n<head>\n<meta charset=\"utf-8\"/>\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\"/>\n<title>2DPPI-Viewer</title>\n<style>\n  html, body {\n    margin:0; height:100%; overflow:hidden;\n    font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;\n  }\n\n  #topbar {\n    position: fixed; left: 10px; top: 10px; z-index: 10;\n    display:flex; gap:10px; align-items:center; flex-wrap:wrap;\n    max-width: calc(100% - 20px);\n  }\n\n  .btn {\n    border:1px solid #c7c7c7; background:#fff; padding:8px 12px; border-radius:10px;\n    font-weight:800; cursor:pointer; user-select:none;\n    box-shadow: 0 1px 6px rgba(0,0,0,0.08);\n  }\n  .btn.on { background:#e8f0fe; border-color:#7aa5ff; }\n\n  #hint {\n    margin-left: 10px; color:#444; font-size: 13px;\n    max-width: 980px;\n    line-height: 1.25;\n  }\n\n  #legendbar {\n    position: fixed;\n    left: 10px;\n    right: 10px;\n    bottom: 10px;\n    z-index: 10;\n    display:flex;\n    gap: 12px;\n    align-items:center;\n    justify-content: center;\n    flex-wrap: wrap;\n    background: rgba(255,255,255,0.92);\n    border: 1px solid #d6d6d6;\n    border-radius: 12px;\n    padding: 8px 10px;\n    box-shadow: 0 1px 6px rgba(0,0,0,0.08);\n    font-size: 12.5px;\n    color: #222;\n  }\n  .legendGroup { display:flex; align-items:center; gap:10px; flex-wrap:wrap; }\n  .legendSpacer { width: 18px; height: 18px; border-left: 1px solid rgba(0,0,0,0.18); margin: 0 6px; }\n\n  /* Residue legend pills */\n  .lgPill {\n    display:inline-flex; align-items:center; justify-content:center;\n    padding: 6px 10px;\n    border-radius: 999px;\n    border: 2px solid rgba(0,0,0,0.25);\n    font-weight: 800;\n    letter-spacing: 0.1px;\n    user-select:none;\n  }\n\n  /* Atom legend (dots) */\n  .lgAtomItem { display:inline-flex; align-items:center; gap:8px; font-weight:800; }\n  .lgDot {\n    width: 12px; height: 12px; border-radius: 999px;\n    border: 1px solid rgba(0,0,0,0.28);\n    display:inline-block;\n  }\n  .lgAtomText { color: #222; }\n\n  svg { width:100%; height:100%; background:#ffffff; overflow: visible; }\n\n  .edgeLabel, .nodeLabel, .resLabel, .atomLabel {\n    pointer-events:none;\n    stroke: none;\n  }\n\n  .res { cursor: grab; }\n  .res:active { cursor: grabbing; }\n\n  /* Mobile + touch improvements */\n  #svg { touch-action: none; }\n  #themePanel input, #themePanel textarea, #themePanel select { font-size:16px; }\n  #themePanel { -webkit-overflow-scrolling: touch; }\n\n  @media (max-width: 520px) {\n    #topbar { left: 6px; top: 6px; gap:6px; }\n    .btn { padding:6px 9px; border-radius:10px; font-size:12px; }\n    #themePanel { width: min(92vw, 340px); max-height: calc(100vh - 320px) !important; }\n    /* Make SVG labels smaller on phones */\n    text.resLabel { font-size: 10px; }\n    text.atomLabel { font-size: 9px; }\n    text.chainLabel { font-size: 12px; }\n    #legendbar { font-size: 12px; }\n  }\n\n\n  /* Theme panel sizing + stacking */\n  #themePanel { overflow:auto; max-height: calc(100vh - 140px); z-index: 30; padding-bottom: 12px; box-sizing:border-box; }\n\n  /* Landscape phone: reduce UI footprint */\n  @media (orientation: landscape) and (max-height: 520px) {\n    #hint { display:none; }\n    #topbar { gap:6px; }\n    .btn { padding:6px 9px; border-radius:10px; font-size:12px; }\n    #legendbar { padding: 4px 6px; gap: 8px; font-size: 11.5px; max-height: 72px; overflow:auto; }\n    .lgPill { padding: 4px 8px; }\n    .lgDot { width: 10px; height: 10px; }\n    #themePanel { width: min(70vw, 380px); max-height: calc(100vh - 90px); }\n    text.resLabel { font-size: 9px; }\n    text.atomLabel { font-size: 8px; }\n    text.chainLabel { font-size: 11px; }\n  }\n\n</style>\n</head>\n<body>\n\n<div id=\"topbar\">\n  <div class=\"btn on\" id=\"btnDrag\">Drag nodes: ON</div>\n  <div class=\"btn on\" id=\"btnLock\">Chain-side lock: ON</div>\n  <div class=\"btn on\" id=\"btnPan\">Pan &amp; Zoom: ON</div>\n  <div class=\"btn on\" id=\"btnContacts\">Contacts: ON</div>\n  <div class=\"btn\" id=\"btnHBOnly\">H-bond residues only: OFF</div>\n  <div class=\"btn\" id=\"btnAA\">AA labels: 3-letter</div>\n  \n  <div class=\"btn\" id=\"btnFit\">Fit to view</div>\n  <div class=\"btn\" id=\"btnReset\">Reset</div>\n  <div class=\"btn\" id=\"btnExport\">Export SVG</div>\n  <div id=\"themeWrap\" style=\"position:relative; display:inline-block;\">\n  <div class=\"btn\" id=\"btnTheme\">Theme</div>\n  <div id=\"themePanel\" style=\"display:none; position:absolute; top: calc(100% + 8px); right:0; padding:10px 12px; background:rgba(255,255,255,0.96); border:1px solid #d6d6d6; border-radius:12px; box-shadow:0 6px 18px rgba(0,0,0,0.16); z-index:9999; width: 320px; max-height: calc(100vh - 140px); overflow:auto;\">\n\n    <div style=\"font-weight:900; margin-bottom:6px;\">Colors</div>\n    <div style=\"display:grid; grid-template-columns: 110px 90px 90px; gap:6px 10px; align-items:center; font-size:12px;\">\n      <div></div><div style=\"font-weight:800;\">Fill</div><div style=\"font-weight:800;\">Stroke</div>\n      <div>Positive</div><input type=\"color\" id=\"cPosFill\"><input type=\"color\" id=\"cPosStroke\">\n      <div>Negative</div><input type=\"color\" id=\"cNegFill\"><input type=\"color\" id=\"cNegStroke\">\n      <div>Polar</div><input type=\"color\" id=\"cPolFill\"><input type=\"color\" id=\"cPolStroke\">\n      <div>Special</div><input type=\"color\" id=\"cSpeFill\"><input type=\"color\" id=\"cSpeStroke\">\n      <div>Hydrophobic</div><input type=\"color\" id=\"cHydFill\"><input type=\"color\" id=\"cHydStroke\">\n      <div style=\"grid-column:1 / span 3; height:1px; background:rgba(0,0,0,0.15); margin:4px 0;\"></div>\n      <div>+charge atom</div><input type=\"color\" id=\"cPosAtom\"><div></div>\n      <div>-charge atom</div><input type=\"color\" id=\"cNegAtom\"><div></div>\n      <div>Disulfide atom</div><input type=\"color\" id=\"cDisAtom\"><div></div>\n    </div>\n\n    <div style=\"height:10px;\"></div>\n    <div style=\"font-weight:900; margin:4px 0 6px;\">Chain labels</div>\n    <div style=\"display:grid; grid-template-columns: 90px 1fr; gap:6px 10px; align-items:center; font-size:12px;\">\n      <div>Chain A</div><input type=\"text\" id=\"chainAName\" placeholder=\"Chain A\" style=\"width:100%; padding:6px 8px; border:1px solid #d6d6d6; border-radius:8px; font-size:12px;\">\n      <div>Chain B</div><input type=\"text\" id=\"chainBName\" placeholder=\"Chain B\" style=\"width:100%; padding:6px 8px; border:1px solid #d6d6d6; border-radius:8px; font-size:12px;\">\n    </div>\n\n    <hr style=\"border:none; border-top:1px solid #e5e5e5; margin:12px 0 10px;\">\n    <div style=\"font-weight:900; margin-bottom:6px;\">Session</div>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap;\">\n      <div class=\"btn\" id=\"btnSessionExport\" style=\"padding:6px 10px;\">Export JSON</div>\n      <div class=\"btn\" id=\"btnSessionImport\" style=\"padding:6px 10px;\">Import JSON</div>\n    </div>\n    <div style=\"font-size:12px; opacity:0.75; margin-top:6px; line-height:1.25;\">\n      Exports/imports: colors, chain names, AA label mode, view (zoom/pan), residue positions/rotations.\n    </div>\n\n    <div style=\"display:flex; gap:8px; margin-top:8px; justify-content:flex-end;\">\n      <div class=\"btn\" id=\"btnChainReset\" style=\"padding:6px 10px;\">Reset chains</div>\n    </div>\n    <div style=\"display:flex; gap:8px; margin-top:8px; justify-content:flex-end;\">\n      <div class=\"btn\" id=\"btnThemeReset\" style=\"padding:6px 10px;\">Reset colors</div>\n      <div class=\"btn on\" id=\"btnThemeClose\" style=\"padding:6px 10px;\">Close</div>\n    </div>\n  </div>\n</div>\n\n  <div id=\"hint\">Drag residues \u2022 Wheel zoom \u2022 Pan: Shift-drag or middle mouse on background \u2022 Alt + drag (focus residue) rotates its atom diagram \u2022 Green dashed = H-bond (distance) \u2022 Yellow dashed = disulfide \u2022 Gray = contact</div>\n</div>\n\n\n<div id=\"sessionModal\" style=\"display:none; position:fixed; inset:0; z-index:10000; background:rgba(0,0,0,0.45);\">\n  <div style=\"position:absolute; left:50%; top:50%; transform:translate(-50%,-50%); width:min(92vw, 720px); background:rgba(255,255,255,0.98); border:1px solid #d6d6d6; border-radius:14px; box-shadow:0 10px 28px rgba(0,0,0,0.25); padding:12px;\">\n    <div style=\"display:flex; justify-content:space-between; align-items:center; gap:10px; margin-bottom:8px;\">\n      <div style=\"font-weight:900;\">Session JSON</div>\n      <div class=\"btn\" id=\"btnSessionClose\" style=\"padding:6px 10px;\">Close</div>\n    </div>\n    <textarea id=\"sessionTextarea\" spellcheck=\"false\" style=\"width:100%; height: min(55vh, 420px); resize:vertical; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, 'Liberation Mono', 'Courier New', monospace; font-size:12px; padding:10px; border:1px solid #ddd; border-radius:10px;\"></textarea>\n    <div style=\"display:flex; gap:8px; flex-wrap:wrap; justify-content:flex-end; margin-top:8px;\">\n      <input id=\"sessionFile\" type=\"file\" accept=\"application/json\" style=\"display:none;\">\n      <div class=\"btn\" id=\"btnSessionCopy\" style=\"padding:6px 10px;\">Copy</div>\n      <div class=\"btn\" id=\"btnSessionDownload\" style=\"padding:6px 10px;\">Download</div>\n      <div class=\"btn on\" id=\"btnSessionApply\" style=\"padding:6px 10px;\">Apply</div>\n    </div>\n    <div style=\"font-size:12px; opacity:0.75; margin-top:6px; line-height:1.25;\">\n      Tip: On mobile, use Copy and paste into Notes/email to move to PC, or Download if supported.\n    </div>\n  </div>\n</div>\n\n\n<div id=\"legendbar\">\n  <div class=\"legendGroup legendResidues\"><span class=\"lgPill\" data-cls=\"positive\" style=\"background:rgba(255,109,96,0.22); border-color:#b23b32; color:#b23b32;\">Positive</span><span class=\"lgPill\" data-cls=\"negative\" style=\"background:rgba(106,169,255,0.22); border-color:#2e5aa8; color:#2e5aa8;\">Negative</span><span class=\"lgPill\" data-cls=\"polar\" style=\"background:rgba(255,213,79,0.22); border-color:#c49000; color:#c49000;\">Polar</span><span class=\"lgPill\" data-cls=\"special\" style=\"background:rgba(153,246,228,0.22); border-color:#0F766E; color:#0F766E;\">Special</span><span class=\"lgPill\" data-cls=\"hydrophobic\" style=\"background:rgba(208,208,208,0.22); border-color:#7a7a7a; color:#7a7a7a;\">Hydrophobic</span></div><div class=\"legendSpacer\"></div><div class=\"legendGroup legendAtoms\"><span class=\"lgAtomItem\"><span class=\"lgDot\" data-atomkey=\"posAtom\" style=\"background:#FF6D00;\"></span><span class=\"lgAtomText\">+charge atoms</span></span><span class=\"lgAtomItem\"><span class=\"lgDot\" data-atomkey=\"negAtom\" style=\"background:#6A1B9A;\"></span><span class=\"lgAtomText\">-charge atoms</span></span><span class=\"lgAtomItem\"><span class=\"lgDot\" data-atomkey=\"disAtom\" style=\"background:#FFD54F;\"></span><span class=\"lgAtomText\">disulfide</span></span></div>\n</div>\n\n<svg id=\"svg\" viewBox=\"0 0 1600 900\">\n  <g id=\"viewport\">\n__SVG_CONTENT__\n</g>\n</svg>\n\n<script>\nconst W = 1600, H = 900;\nconst BOUNDARY_Y = __BOUNDARY_Y__;\n\nconst RES = __RES_JSON__;\n// per-focus atom block offset (to pull toward boundary when label would overlap another residue)\nfor (const [rid, r] of Object.entries(RES)) {\n  if (r.aox === undefined) r.aox = 0;\n  if (r.aoy === undefined) r.aoy = 0;\n  r._aox0 = r.aox;\n  r._aoy0 = r.aoy;\n}\nconst LABEL_TOP_GAP = 10;   // gap between atom diagram and residue label (larger => label higher)\nconst PULL_STEP = 4;        // px per iteration when pulling toward boundary\nconst PULL_MAX_ITERS = 30;  // safety\n\nconst EDGES = __EDGES_JSON__;\n\nconst SIMPLE_R = 20.000;\nconst FOCUS_R  = 44.000;\n\nconst RELAX_ITERS = 320;\nconst RELAX_GAP   = 14.0;\nconst RELAX_STEP  = 0.38;\n\nconst RELAX_ON_POINTERUP = false;\n\nlet dragEnabled = true;\nlet chainSideLock = true;\nlet panZoomEnabled = true;\nlet contactsVisible = true;\n\n// New: hide residues that are not in H-bond network\nlet hbOnly = false;\n\nconst btnDrag = document.getElementById('btnDrag');\nconst btnLock = document.getElementById('btnLock');\nconst btnPan  = document.getElementById('btnPan');\nconst btnContacts = document.getElementById('btnContacts');\nconst btnHBOnly = document.getElementById('btnHBOnly');\nconst btnFit  = document.getElementById('btnFit');\nconst btnReset= document.getElementById('btnReset');\nconst btnExport= document.getElementById('btnExport');\n\nconst svg = document.getElementById('svg');\nconst viewport = document.getElementById('viewport');\n\nfunction slug(s) { return s.replace(/[^A-Za-z0-9_]+/g, '_'); }\n\nfor (const [rid, r] of Object.entries(RES)) {\n  r._x0 = r.x; r._y0 = r.y;\n  r.rot = 0;\n  r._rot0 = 0;\n}\n\n// Build set of residues participating in ANY H-bond\nconst HB_RES = new Set();\nfor (const e of EDGES) {\n  if (e.type === 'hbond') {\n    HB_RES.add(e.ra);\n    HB_RES.add(e.rb);\n  }\n}\n\nbtnDrag.addEventListener('click', () => {\n  dragEnabled = !dragEnabled;\n  btnDrag.classList.toggle('on', dragEnabled);\n  btnDrag.textContent = dragEnabled ? \"Drag nodes: ON\" : \"Drag nodes: OFF\";\n});\n\nbtnLock.addEventListener('click', () => {\n  chainSideLock = !chainSideLock;\n  btnLock.classList.toggle('on', chainSideLock);\n  btnLock.textContent = chainSideLock ? \"Chain-side lock: ON\" : \"Chain-side lock: OFF\";\n  resolveOverlaps();\n  updateAllEdges();\n  autoPlaceFocusTopLabelsAndPull();\n});\n\nbtnPan.addEventListener('click', () => {\n  panZoomEnabled = !panZoomEnabled;\n  btnPan.classList.toggle('on', panZoomEnabled);\n  btnPan.textContent = panZoomEnabled ? \"Pan & Zoom: ON\" : \"Pan & Zoom: OFF\";\n});\n\nfunction applyContactsVisibility() {\n  const els = document.querySelectorAll('line.edge.contact');\n  els.forEach(el => {\n    el.style.display = contactsVisible ? '' : 'none';\n  });\n}\n\nfunc iewToResidues();\n});\n\nfunction setAtomBlockRotation(rid) {\n  const r = RES[rid];\n  if (!r || !r.focus) return;\n  const ab = document.getElementById('atomblock_' + slug(rid));\n  if (!ab) return;\n  const deg = (r.rot || 0);\n  ab.setAttribute('transform', `rotate(${deg})`);\n}\n\n\nfunction _rectOverlap(a, b, pad=0) {\n  return !((a.right + pad) < b.left || (b.right + pad) < a.left || (a.bottom + pad) < b.top || (b.bottom + pad) < a.top);\n}\n\n// Place focus residue label above its atom diagram; if it overlaps another residue node circle,\n// pull the atom diagram + label toward the boundary line (keeps initial orientation stable).\nfunction autoPlaceFocusTopLabelsAndPull() {\n  // Build list of other residue circles (simple nodes + focus centers)\n  const circles = [];\n  for (const [rid2, r2] of Object.entries(RES)) {\n    const g2 = document.getElementById('res_' + slug(rid2));\n    if (!g2 || g2.style.display === 'none') continue;\n    if (hbOnly && !HB_RES.has(rid2)) continue;\n\n    let c = null;\n    if (r2.focus) c = g2.querySelector('circle.center');\n    else c = g2.querySelector('circle.node');\n    if (!c) continue;\n    circles.push({rid: rid2, el: c});\n  }\n\n  for (const [rid, r] of Object.entries(RES)) {\n    if (!r || !r.focus) continue;\n\n    const g = document.getElementById('res_' + slug(rid));\n    if (!g || g.style.display === 'none') continue;\n    if (hbOnly && !HB_RES.has(rid)) continue;\n\n    const label = g.querySelector('text.resLabel');\n    const ab = document.getElementById('atomblock_' + slug(rid));\n    if (!label || !ab) continue;\n\n    // compute desired label position in local coords (accounting for aox/aoy since bbox ignores transforms)\n    let bb;\n    try { bb = ab.getBBox(); } catch(e) { continue; }\n\n    const lx = (bb.x + bb.width/2) + (r.aox||0);\n    const ly = (bb.y) + (r.aoy||0) - LABEL_TOP_GAP;\n\n    label.setAttribute('text-anchor', 'middle');\n    label.setAttribute('dominant-baseline', 'alphabetic');\n  const cls = r.cls || \"other\";\n    const c = THEME[cls] || THEME.other;\n\n    if (r.focus) {\n      const center = g.querySelector(\"circle.center\");\n      if (center) {\n        center.setAttribute(\"fill\", c.fill);\n        center.setAttribute(\"opacity\", String(THEME.alpha));\n      }\n      const t = g.querySelector(\"text.resLabel\");\n      if (t) t.setAttribute(\"fill\", c.stroke);\n    } else {\n      const node = g.querySelector(\"circle.node\");\n      const t = g.querySelector(\"text.nodeLabel\");\n      if (node) {\n        node.setAttribute(\"fill\", c.fill);\n        node.setAttribute(\"fill-opacity\", String(THEME.alpha));\n        node.setAttribute(\"stroke\", c.stroke);\n      }\n      if (t) t.setAttribute(\"fill\", c.stroke);\n    }\n  }\n\n  document.querySelectorAll(\".lgPill\").forEach(el => {\n    const cls = el.getAttribute(\"data-cls\") || \"other\";\n    const c = THEME[cls] || THEME.other;\n    el.style.background = rgba(c.fill, THEME.alpha);\n    el.style.borderColor = c.stroke;\n    el.style.color = c.stroke;\n  });\n\n  document.querySelectorAll(\".lgDot\").forEach(el => {\n    const key = el.getAttribute(\"data-atomkey\") || \"\";\n    if (key === \"posAtom\") el.style.background = THEME.posAtom;\n    else if (key === \"negAtom\") el.style.background = THEME.negAtom;\n    else if (key === \"disAtom\") el.style.background = THEME.disAtom;\n  });\n\n  document.querySelectorAll(\"circle.atom\").forEach(el => {\n    const name = el.getAttribute(\"data-name\") || \"\";\n    const g = el.closest(\"g.res\");\n    const res3 = g ? (g.getAttribute(\"data-res3\") || \"\") : \"\";\n    if ((res3 || \"\").toUpperCase() === \"CYS\" && (name || \"\").toUpperCase() === \"SG\") {\n      el.setAttribute(\"fill\", THEME.disAtom);\n    } else if (isPosCharge(res3, name)) el.setAttribute(\"fill\", THEME.posAtom);\n    else if (isNegCharge(res3, name)) el.setAttribute(\"fill\", THEME.negAtom);\n  });\n\n  syncColorInputs();\n}\n\nfunction saveTheme() {\n  safeStorageSet(\"dimplot_theme_v1\", JSON.stringify(THEME));\n}\n\nfunction wireColorInputs() {\n  const pairs = [\n    [\"cPosFill\", [\"positive\",\"fill\"]], [\"cPosStroke\", [\"positive\",\"stroke\"]],\n    [\"cNegFill\", [\"negative\",\"fill\"]], [\"cNegStroke\", [\"negative\",\"stroke\"]],\n    [\"cPolFill\", [\"polar\",\"fill\"]], [\"cPolStroke\", [\"polar\",\"stroke\"]],\n    [\"cSpeFill\", [\"special\",\"fill\"]], [\"cSpeStroke\", [\"special\",\"stroke\"]],\n    [\"cHydFill\", [\"hydrophobic\",\"fill\"]], [\"cHydStroke\", [\"hydrophobic\",\"stroke\"]],\n  ];\n  for (const [id, path] of pairs) {\n    $(id).addEventListener(\"input\", e => {\n      THEME[path[0]][path[1]] = e.target.value;\n      saveTheme();\n      applyTheme();\n    });\n  }\n  $(\"cPosAtom\").addEventListener(\"input\", e => {\n    THEME.posAtom = e.target.value;\n    saveTheme();\n    applyTheme();\n  });\n  $(\"cNegAtom\").addEventListener(\"input\", e => {\n    THEME.negAtom = e.target.value;\n    saveTheme();\n    applyTheme();\n  });\n  $(\"cDisAtom\").addEventListener(\"input\", e => {\n    THEME.disAtom = e.target.value;\n    saveTheme();\n    applyTheme();\n  });\n}\n\n\n// -----------------------------\n// Chain label renaming (GUI)\n// -----------------------------\nfunction applyChainNames(nameA, nameB) {{\n  const a = document.getElementById(\"chainA_label\");\n  const b = document.getElementById(\"chainB_label\");\n  if (a) a.textContent = nameA || \"Chain A\";\n  if (b) b.textContent = nameB || \"Chain B\";\n}}\n\nfunction loadChainNames() {{\n  const nameA = safeStorageGet(\"chainAName\") || \"Chain A\";\n  const nameB = safeStorageGet(\"chainBName\") || \"Chain B\";\n  return [nameA, nameB];\n}}\n\nfunction saveChainNames(nameA, nameB) {{\n  safeStorageSet(\"chainAName\", nameA || \"Chain A\");\n  safeStorageSet(\"chainBName\", nameB || \"Chain B\");\n}}\n\nfunction wireChainInputs() {{\n  const inpA = document.getElementById(\"chainAName\");\n  const inpB = document.getElementById(\"chainBName\");\n  const btnReset = document.getElementById(\"btnChainReset\");\n  if (!inpA || !inpB) return;\n\n  const [nameA0, nameB0] = loadChainNames();\n  inpA.value = nameA0;\n  inpB.value = nameB0;\n  applyChainNames(nameA0, nameB0);\n\n  function commit() {{\n    const nameA = (inpA.value || \"\").trim() || \"Chain A\";\n    const nameB = (inpB.value || \"\").trim() || \"Chain B\";\n    saveChainNames(nameA, nameB);\n    applyChainNames(nameA, nameB);\n  }}\n\n  inpA.addEventListener(\"input\", commit);\n  inpB.addEventListener(\"input\", commit);\n\n  if (btnReset) {{\n    btnReset.addEventListener(\"click\", () => {{\n      inpA.value = \"Chain A\";\n      inpB.value = \"Chain B\";\n      commit();\n    }});\n  }}\n}}\n\nlet aaMode = (safeStorageGet(\"dimplot_aa_mode\", \"3\") || \"3\");\nfunction applyAAMode() {\n  for (const [rid, r] of Object.entries(RES)) {\n    const g = document.getElementById(\"res_\" + slug(rid));\n    if (!g) continue;\n    const txt = r.focus ? g.querySelector(\"text.resLabel\") : g.querySelector(\"text.nodeLabel\");\n    if (!txt) continue;\n    txt.textContent = (aaMode === \"1\") ? (r.label1 || r.label3 || r.label) : (r.label3 || r.label);\n  }\n  btnAA.textContent = (aaMode === \"1\") ? \"AA labels: 1-letter\" : \"AA labels: 3-letter\";\n}\nfunction saveAAMode() { safeStorageSet(\"dimplot_aa_mode\", aaMode); }\n\nbtnAA.addEventListener(\"click\", () => {\n  aaMode = (aaMode === \"1\") ? \"3\" : \"1\";\n  saveAAMode();\n  applyAAMode();\n});\n\nbtnTheme.addEventListener(\"click\", () => {\n  const open = (themePanel.style.display === \"none\");\n  themePanel.style.display = open ? \"\" : \"none\";\n  if (open) {\n    positionThemePanel();\n    syncColorInputs();\n  }\n});\n\nwindow.addEventListener(\"resize\", () => {\n  if (themePanel.style.display !== \"none\") positionThemePanel();\n});\nwindow.addEventListener(\"orientationchange\", () => {\n  if (themePanel.style.display !== \"none\") {\n    // Wait on  st.flags.contactsVisible === \"boolean\") contactsVisible = st.flags.contactsVisible;\n    if (typeof st.flags.hbOnly === \"boolean\") hbOnly = st.flags.hbOnly;\n\n    // sync buttons (do NOT trigger side effects beyond display)\n    try {\n      btnDrag.classList.toggle('on', dragEnabled);\n      btnDrag.textContent = dragEnabled ? \"Drag ON\" : \"Drag OFF\";\n    } catch(e) {}\n    try {\n      btnLock.classList.toggle('on', chainSideLock);\n      btnLock.textContent = chainSideLock ? \"Lock ON\" : \"Lock OFF\";\n    } catch(e) {}\n    try {\n      btnPan.classList.toggle('on', panZoomEnabled);\n      btnPan.textContent = panZoomEnabled ? \"Pan ON\" : \"Pan OFF\";\n    } catch(e) {}\n    try {\n      btnContacts.classList.toggle('on', contactsVisible);\n      btnContacts.textContent = contactsVisible ? \"Contacts ON\" : \"Contacts OFF\";\n    } catch(e) {}\n    try {\n      btnHBOnly.classList.toggle('on', hbOnly);\n      btnHBOnly.textContent = hbOnly ? \"H-bond only: ON\" : \"H-bond only: OFF\";\n    } catch(e) {}\n  }\n\n  // Residues positions/rotations\n  if (st.residues && typeof st.residues === \"object\") {\n    for (const [rid, s] of Object.entries(st.residues)) {\n      const r = RES[rid];\n      if (!r || !s) continue;\n      if (typeof s.x === \"number\") r.x = s.x;\n      if (typeof s.y === \"number\") r.y = s.y;\n      if (typeof s.rot === \"number\") r.rot = s.rot;\n      if (typeof s.aox === \"number\") r.aox = s.aox;\n      if (typeof s.aoy === \"number\") r.aoy = s.aoy;\n\n      const g = document.getElementById(\"res_\" + slug(rid));\n      if (g) g.setAttribute(\"transform\", `translate(${r.x},${r.y})`);\n      if (r.focus) setAtomBlockRotation(rid);\n    }\n    updateAllEdges();\n  }\n\n  // Re-apply filters/visibility and HB top labels\n  try { applyResidueFilter(); } catch(e) {}\n  try { applyHbondVisibilityByFilter(); } catch(e) {}\n  try { autoPlaceFocusTopLabelsAndPull(); } catch(e) {}\n  try { updateAllEdges(); } catch(e) {}\n}\n\nfunction downloadText(filename, text) {\n  try {\n    const blob = new Blob([text], {type:\"application/json\"});\n    const url = URL.createObjectURL(blob);\n    const a = document.createElement(\"a\");\n    a.href = url;\n    a.download = filename;\n    document.body.appendChild(a);\n    a.click();\n    a.remove();\n    setTimeout(() => URL.revokeObjectURL(url), 1500);\n  } catch (e) {}\n}\n\nif (btnSessionExport) {\n  btnSessionExport.addEventListener(\"click\", (e) => {\n    e.preventDefault();\n    e.stopPropagation();\n    const st = collectSessionState();\n    const json = JSON.stringify(st, null, 2);\n    openSessionModal(json);\n  });\n}\nif (btnSessionImport) {\n  btnSessionImport.addEventListener(\"click\", (e) => {\n    e.preventDefault();\n    e.stopPropagation();\n    openSessionModal(\"\");\n    // open file picker as convenience (user can cancel)\n    try { sessionFile.click(); } catch(err) {}\n  });\n}\nif (btnSessionClose) btnSessionClose.addEventListener(\"click\", (e)=>{ e.preventDefault(); closeSessionModal(); });\nif (sessionModal) {\n  // clicking backdrop closes\n  sessionModal.addEventListener(\"pointerdown\", (e)=>{ if (e.target === sessionModal) closeSessionModal(); });\n  // prevent canvas gesture stealing\n  sessionModal.addEventListener(\"pointerdown\", (e)=>{ e.stopPropagation(); }, true);\n}\n\nif (btnSessionCopy) btnSessionCopy.addEventListener(\"click\", ()=>{ _safeCopy(sessionTextarea.value || \"\"); });\n\nif (btnSessionDownload) btnSessionDownload.addEventListener(\"click\", ()=>{\n  const txt = sessionTextarea.value || \"\";\n  if (!txt.trim()) return;\n  downloadText(\"2DPPIViewer_session.json\", txt);\n});\n\nif (btnSessionApply) btnSessionApply.addEventListener(\"click\", ()=>{\n  const txt = sessionTextarea.value || \"\";\n  if (!txt.trim()) return;\n  try {\n    const st = JSON.parse(txt);\n    applySessionState(st);\n    closeSessionModal();\n  } catch (e) {\n    alert(\"Invalid JSON.\");\n  }\n});\n\nif (sessionFile) {\n  sessionFile.addEventListener(\"change\", async ()=>{\n    const f = sessionFile.files && sessionFile.files[0];\n    if (!f) return;\n    try {\n      const txt = await f.text();\n      sessionTextarea.value = txt;\n    } catch(e) {}\n  });\n}\n\n// Prevent theme panel inputs from triggering canvas drag on mobile\nif (themePanel) {\n  themePanel.addEventListener(\"pointerdown\", (e)=>{ e.stopPropagation(); }, true);\n  themePanel.addEventListener(\"touchstart\", (e)=>{ e.stopPropagation(); }, true);\n}\n\n\n// -----------------------------\n// Touch pinch-zoom (mobile) (added)\n// - Only intercept when 2 fingers are active, so single-finger drag stays unchanged.\n// -----------------------------\n(function(){\n  const pts = new Map(); // pointerId -> {x,y}\n  let pinching = false;\n  let pinch0 = null; // {dist, midx, midy, viewx, viewy, viewk}\n\n  function dist(a,b){ const dx=a.x-b.x, dy=a.y-b.y; return Math.hypot(dx,dy); }\n  function mid(a,b){ return {x:(a.x+b.x)/2, y:(a.y+b.y)/2}; }\n\n  svg.addEventListener(\"pointerdown\", (evt)=>{\n    if (evt.pointerType !== \"touch\") return;\n    if (evt.target.closest(\"#topbar\") || evt.target.closest(\"#themePanel\") || evt.target.closest(\"#sessionModal\")) return;\n    const p = svgPoint(evt);\n    pts.set(evt.pointerId, {x:p.x, y:p.y});\n    if (pts.size === 2) {\n      const arr = Array.from(pts.values());\n      const d0 = dist(arr[0], arr[1]);\n      const m0 = mid(arr[0], arr[1]);\n      pinching = true;\n      pinch0 = {dist:d0, midx:m0.x, midy:m0.y, viewx:view.x, viewy:view.y, viewk:view.k};\n      // Stop other handlers (drag/pan) only once pinch starts\n      evt.preventDefault();\n      evt.stopImmediatePropagation();\n    }\n  }, {capture:true});\n\n  svg.addEventListener(\"pointermove\", (evt)=>{\n    if (!pinching) return;\n    if (evt.pointerType !== \"touch\") return;\n    if (!pts.has(evt.pointerId)) return;\n    const p = svgPoint(evt);\n    pts.set(evt.pointerId, {x:p.x, y:p.y});\n    if (pts.size !== 2 || !pinch0) return;\n\n    const arr = Array.from(pts.values());\n    const d = dist(arr[0], arr[1]);\n    const m = mid(arr[0], arr[1]);\n    const scale = (d && pinch0.dist) ? (d / pinch0.dist) : 1;\n\n    const newK = Math.min(8, Math.max(0.2, pinch0.viewk * scale));\n    view.k = newK;\n    // Pan with midpoint movement (screen space)\n    view.x = pinch0.viewx + (m.x - pinch0.midx);\n    view.y = pinch0.viewy + (m.y - pinch0.midy);\n\n    applyView();\n    evt.preventDefault();\n    evt.stopImmediatePropagation();\n  }, {capture:true});\n\n  function end(evt){\n    if (evt && pts.has(evt.pointerId)) pts.delete(evt.pointerId);\n    if (pts.size < 2) { pinching = false; pinch0 = null; }\n  }\n  svg.addEventListener(\"pointerup\",   (evt)=>{ end(evt); }, {capture:true});\n  svg.addEventListener(\"pointercancel\",(evt)=>{ end(evt); }, {capture:true});\n})();\n\napplyTheme();\napplyAAMode();\n// Initial focus label placement (avoid atom-label overlap on first load)\nrequestAnimationFrame(() => {\n  requestAnimationFrame(() => {\n    try { autoPlaceFocusTopLabelsAndPull(); } catch (e) { console.warn('init focus label placement failed', e); }\n  });\n});\n\n\nfunction makeSnapshotHtml() {\n  const st = collectSessionState();\n  const marker = '<script>window.__DIMPLOT_SESSION__ = ' + JSON.stringify(st) + ';<\\\\/script>';\n  const html = document.documentElement.outerHTML;\n  if (html.includes('</body>')) return html.replace('</body>', marker + '\\\\n</body>');\n  return html + marker;\n}\n\n(function(){\n  const st = window.__DIMPLOT_SESSION__;\n  if (!st) return;\n  try { applySessionState(st); } catch (e) {}\n  requestAnimationFrame(() => {\n    requestAnimationFrame(() => {\n      try { autoPlaceFocusTopLabelsAndPull(); } catch (e) {}\n      try { updateAllEdges(); } catch (e) {}\n    });\n  });\n})();\n\n<\/script>\n</body>\n</html>\n";

const POSITIVE = new Set(["ARG","LYS","HIS"]);
const NEGATIVE = new Set(["ASP","GLU"]);
const POLAR_UNCHARGED = new Set(["SER","THR","ASN","GLN","TYR","CYS"]);
const SPECIAL = new Set(["GLY","PRO"]);
const HYDROPHOBIC = new Set(["ALA","VAL","LEU","ILE","MET","PHE","TRP"]);
const POS_CHARGE_ATOMNAMES = {
  LYS: new Set(["NZ"]),
  ARG: new Set(["NE", "NH1", "NH2"]),
  HIS: new Set(["ND1", "NE2"]),
};
const NEG_CHARGE_ATOMNAMES = {
  ASP: new Set(["OD1", "OD2"]),
  GLU: new Set(["OE1", "OE2"]),
};
const POS_CHARGE_COLOR = "#FF6D00";
const NEG_CHARGE_COLOR = "#6A1B9A";
const DISULPHIDE_COLOR = "#FFD54F";
const AA1 = {
  ALA:"A",ARG:"R",ASN:"N",ASP:"D",CYS:"C",GLN:"Q",GLU:"E",GLY:"G",HIS:"H",ILE:"I",
  LEU:"L",LYS:"K",MET:"M",PHE:"F",PRO:"P",SER:"S",THR:"T",TRP:"W",TYR:"Y",VAL:"V",
};

let currentBlobUrl = null;

function setStatus(msg) {
  document.getElementById("status").textContent = msg;
}

function cleanResLabel(line) {
  const m = line.trim().match(/([A-Za-z]{3}\d+\([^)]+\))\s*$/);
  if (m) return m[1];
  const toks = line.trim().split(/\s+/);
  return toks.length ? toks[toks.length - 1] : line.trim();
}
function isResLabel(s) {
  const t = (s || "").trim();
  return /[A-Za-z]/.test(t) && /\d/.test(t) && !/^\d+(\.\d+)?$/.test(t);
}
function slug(s) {
  return String(s).replace(/[^A-Za-z0-9_]+/g, "_");
}
function displayResName(resId) {
  return String(resId).replace(/\([^)]+\)\s*$/, "").trim();
}
function extractChain(resId) {
  const m = String(resId).match(/\(([^)]+)\)\s*$/);
  if (!m) return "?";
  const ch = m[1].trim();
  return ch ? ch[0] : "?";
}
function res3FromLabel(resId) {
  const name = displayResName(resId);
  const m = name.match(/^([A-Za-z]{3})/);
  return m ? m[1].toUpperCase() : "UNK";
}
function residueClass(res3) {
  const r = String(res3 || "").toUpperCase();
  if (POSITIVE.has(r)) return "positive";
  if (NEGATIVE.has(r)) return "negative";
  if (POLAR_UNCHARGED.has(r)) return "polar";
  if (SPECIAL.has(r)) return "special";
  if (HYDROPHOBIC.has(r)) return "hydrophobic";
  return "other";
}
function label1FromLabel(label3) {
  const t = String(label3 || "").trim();
  const m = t.match(/^([A-Za-z]{3})(.*)$/);
  if (!m) return t;
  return (AA1[m[1].toUpperCase()] || "X") + m[2];
}
function atomColor(el) {
  const u = String(el || "").toUpperCase();
  if (u === "C") return "#222";
  if (u === "O") return "#D32F2F";
  if (u === "N") return "#1976D2";
  if (u === "S") return "#F9A825";
  if (u === "P") return "#8E24AA";
  return "#555";
}
function classColors(cls) {
  if (cls === "positive") return ["#ff6d60", "#b23b32"];
  if (cls === "negative") return ["#6aa9ff", "#2e5aa8"];
  if (cls === "polar") return ["#ffd54f", "#c49000"];
  if (cls === "special") return ["#99F6E4", "#0F766E"];
  if (cls === "hydrophobic") return ["#d0d0d0", "#7a7a7a"];
  return ["#95A5A6", "#666666"];
}
function overrideAtomColor(res3, atomName, baseColor) {
  const r = String(res3 || "").toUpperCase();
  const a = String(atomName || "").toUpperCase();
  if (POS_CHARGE_ATOMNAMES[r] && POS_CHARGE_ATOMNAMES[r].has(a)) return POS_CHARGE_COLOR;
  if (NEG_CHARGE_ATOMNAMES[r] && NEG_CHARGE_ATOMNAMES[r].has(a)) return NEG_CHARGE_COLOR;
  if (r === "CYS" && a === "SG") return DISULPHIDE_COLOR;
  return baseColor;
}
function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}

function parseDrwText(text) {
  const lines = String(text).replace(/\r\n?/g, "\n").split("\n");
  const residues = [];
  const atomByIdx = new Map();
  let i = 0;
  while (i < lines.length) {
    if (lines[i].trim().startsWith("#R")) {
      i += 1;
      if (i >= lines.length) break;
      const resLabel = cleanResLabel(lines[i].trim());
      if (!isResLabel(resLabel)) {
        i += 1;
        continue;
      }
      const chain = extractChain(resLabel);
      while (i < lines.length && lines[i].trim() !== "#A") i += 1;
      if (i >= lines.length) break;
      i += 1;
      const atoms = [];
      while (i < lines.length && !lines[i].trim().startsWith("#")) {
        const l = lines[i];
        const mid = l.match(/\[(\d+)\]\s*$/);
        if (mid) {
          const idx = parseInt(mid[1], 10);
          const parts = l.trim().split(/\s+/);
          if (parts.length >= 6) {
            const x = parseFloat(parts[1]);
            const y = parseFloat(parts[2]);
            if (Number.isFinite(x) && Number.isFinite(y)) {
              const name = parts[0];
              const element = parts[5];
              atomByIdx.set(idx, {
                idx, name, x, y, element,
                res: resLabel,
                chain
              });
              atoms.push(idx);
            }
          }
        }
        i += 1;
      }
      residues.push({ id: resLabel, chain, atoms });
      continue;
    }
    i += 1;
  }

  const bonds = [];
  const hbonds = [];
  const contacts = [];
  const disulphides = [];
  for (const l of lines) {
    const m = l.match(/^\s*([0125])\s+(\d+)\s+(\d+)(.*)$/);
    if (!m) continue;
    const t = parseInt(m[1], 10);
    const a = parseInt(m[2], 10);
    const b = parseInt(m[3], 10);
    const rest = (m[4] || "").trim();
    if (!atomByIdx.has(a) || !atomByIdx.has(b)) continue;
    if (t === 0) {
      const order = rest ? rest.split(/\s+/)[0] : "1";
      bonds.push([a, b, order]);
    } else if (t === 1) {
      let dist = null;
      if (rest) {
        const v = parseFloat(rest.split(/\s+/)[0]);
        dist = Number.isFinite(v) ? v : null;
      }
      hbonds.push([a, b, dist]);
    } else if (t === 2) {
      contacts.push([a, b]);
    } else if (t === 5) {
      disulphides.push([a, b]);
    }
  }
  return { residues, atomByIdx, bonds, hbonds, contacts, disulphides };
}

function computeViewerData(parsed, cfg = DEFAULTS) {
  const { residues, atomByIdx, bonds, hbonds, contacts, disulphides } = parsed;
  const resAtoms = Object.fromEntries(residues.map(r => [r.id, r.atoms]));
  const resChain = Object.fromEntries(residues.map(r => [r.id, r.chain]));

  const resCenter = {};
  for (const [rid, atoms] of Object.entries(resAtoms)) {
    const xs = [];
    const ys = [];
    for (const a of atoms) {
      const info = atomByIdx.get(a);
      if (!info) continue;
      xs.push(info.x);
      ys.push(info.y);
    }
    if (xs.length) {
      resCenter[rid] = [xs.reduce((a,b)=>a+b,0)/xs.length, ys.reduce((a,b)=>a+b,0)/ys.length];
    } else {
      resCenter[rid] = [0, 0];
    }
  }

  const atomLocal = {};
  for (const [idx, info] of atomByIdx.entries()) {
    const rid = info.res;
    if (!atomLocal[rid]) atomLocal[rid] = {};
    const [cx, cy] = resCenter[rid];
    atomLocal[rid][String(idx)] = [info.x - cx, info.y - cy, info.element, info.name];
  }

  const bondsByRes = {};
  for (const [a, b, order] of bonds) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    if (ra !== rb) continue;
    if (!bondsByRes[ra]) bondsByRes[ra] = [];
    bondsByRes[ra].push([String(a), String(b), order]);
  }

  const focusRes = new Set();
  const atomHbonds = [];
  const atomDisulphides = [];
  for (const [a, b, dist] of hbonds) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    if (ra === rb) continue;
    if (dist !== null) {
      focusRes.add(ra);
      focusRes.add(rb);
      atomHbonds.push([a, b, dist]);
    }
  }
  for (const [a, b] of disulphides) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    if (ra === rb) continue;
    focusRes.add(ra);
    focusRes.add(rb);
    atomDisulphides.push([a, b]);
  }

  const contactPairs = new Map();
  for (const [a, b] of contacts) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    if (ra === rb) continue;
    const key = [ra, rb].sort().join("\u0000");
    contactPairs.set(key, (contactPairs.get(key) || 0) + 1);
  }

  const yVals = Object.values(resCenter).map(v => v[1]);
  const yRange = yVals.length ? (Math.max(...yVals) - Math.min(...yVals)) : 1.0;
  const split = (yRange / 2.0) + cfg.split_extra;

  const adjCenter = {};
  for (const [rid, [x, y]] of Object.entries(resCenter)) {
    const ch = resChain[rid] || "?";
    let y2 = y;
    if (ch === "A") y2 = y - split;
    else if (ch === "B") y2 = y + split;
    adjCenter[rid] = [x, y2];
  }

  const yA = Object.entries(adjCenter).filter(([rid]) => resChain[rid] === "A").map(([,v]) => v[1]);
  const yB = Object.entries(adjCenter).filter(([rid]) => resChain[rid] === "B").map(([,v]) => v[1]);
  const boundary = (yA.length && yB.length) ? ((Math.max(...yA) + Math.min(...yB)) / 2.0) : 0.0;

  let maxLocal = 0.0;
  for (const rid of focusRes) {
    const d = atomLocal[rid] || {};
    for (const v of Object.values(d)) {
      maxLocal = Math.max(maxLocal, Math.abs(v[0]), Math.abs(v[1]));
    }
  }
  const extDrw = maxLocal * cfg.atom_scale;

  const xs = [];
  const ys = [];
  for (const [rid, [x,y]] of Object.entries(adjCenter)) {
    const ext = focusRes.has(rid) ? extDrw : 0;
    xs.push(x - ext, x + ext);
    ys.push(y - ext, y + ext);
  }
  const minx = Math.min(...xs);
  const maxx = Math.max(...xs);
  const miny = Math.min(...ys);
  const maxy = Math.max(...ys);
  const xSpan = (maxx - minx) || 1.0;
  const ySpan = (maxy - miny) || 1.0;
  const scale = Math.min((cfg.width - 2*cfg.margin)/xSpan, (cfg.height - 2*cfg.margin)/ySpan);

  function toScreen(x, y) {
    return [cfg.margin + (x - minx) * scale, cfg.margin + (y - miny) * scale];
  }

  const boundaryY = toScreen(minx, boundary)[1];

  const resData = {};
  for (const [rid, [x, y]] of Object.entries(adjCenter)) {
    const [sx, sy] = toScreen(x, y);
    const ch = resChain[rid] || "?";
    const focus = focusRes.has(rid);
    const label = displayResName(rid);
    const res3 = res3FromLabel(rid);
    const cls = residueClass(res3);
    const entry = {
      x: sx,
      y: sy,
      chain: ch,
      focus,
      label3: label,
      label1: label1FromLabel(label),
      label,
      res3,
      cls
    };
    if (focus) {
      const offs = {};
      const atoms = atomLocal[rid] || {};
      for (const [idx, [dx, dy, el, name]] of Object.entries(atoms)) {
        offs[idx] = {
          dx: dx * cfg.atom_scale * scale,
          dy: dy * cfg.atom_scale * scale,
          el,
          name
        };
      }
      entry.atoms = offs;
      entry.bonds = (bondsByRes[rid] || []);
    }
    resData[rid] = entry;
  }

  const screenXs = Object.values(resData).map(r => r.x);
  const screenYs = Object.values(resData).map(r => r.y);
  const cx = screenXs.length ? screenXs.reduce((a,b)=>a+b,0)/screenXs.length : cfg.width/2;
  const cy = screenYs.length ? screenYs.reduce((a,b)=>a+b,0)/screenYs.length : cfg.height/2;
  for (const r of Object.values(resData)) {
    r.x = cx + (r.x - cx) * cfg.x_expand;
    r.y = cy + (r.y - cy) * cfg.y_expand;
  }

  const HB_INNER_FACTOR = 0.7;
  const OTHER_OUTER_FACTOR = 1.08;
  const SHELL_GAP_PX = 25.0;
  for (const r of Object.values(resData)) {
    const side = r.y < boundaryY ? -1 : 1;
    const dist = Math.abs(r.y - boundaryY);
    const newDist = r.focus ? Math.max(8.0, dist * HB_INNER_FACTOR) : (dist * OTHER_OUTER_FACTOR) + SHELL_GAP_PX;
    r.y = boundaryY + side * newDist;
  }

  const edges = [];
  for (const [key, count] of contactPairs.entries()) {
    const [u, v] = key.split("\u0000");
    edges.push({ type: "contact", u, v, count });
  }
  for (const [a, b, dist] of atomHbonds) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    edges.push({ type: "hbond", ra, rb, a: String(a), b: String(b), dist });
  }
  for (const [a, b] of atomDisulphides) {
    const ra = atomByIdx.get(a).res;
    const rb = atomByIdx.get(b).res;
    edges.push({ type: "disulphide", ra, rb, a: String(a), b: String(b) });
  }

  return { boundaryY, resData, edges };
}

function buildSvgContent(data, cfg = DEFAULTS) {
  const parts = [];
  const bx1 = -cfg.boundary_extend_px;
  const bx2 = cfg.width + cfg.boundary_extend_px;
  const boundaryY = data.boundaryY;
  parts.push(`<line id="boundary" x1="${bx1.toFixed(2)}" y1="${boundaryY.toFixed(2)}" x2="${bx2.toFixed(2)}" y2="${boundaryY.toFixed(2)}" stroke="#222" stroke-dasharray="7,6" stroke-width="1.5" opacity="0.45"/>`);
  parts.push(`<text id="chainA_label" x="-200" y="${(boundaryY - cfg.chain_label_offset_px).toFixed(2)}" font-size="18" font-weight="900" fill="#333" text-anchor="middle">Chain A</text>`);
  parts.push(`<text id="chainB_label" x="-200" y="${(boundaryY + cfg.chain_label_offset_px + 18).toFixed(2)}" font-size="18" font-weight="900" fill="#333" text-anchor="middle">Chain B</text>`);

  for (const e of data.edges) {
    if (e.type !== "contact") continue;
    const eid = `c_${slug(e.u)}__${slug(e.v)}`;
    parts.push(`<line class="edge contact" id="${eid}" x1="0" y1="0" x2="0" y2="0" stroke="#9aa0a6" stroke-width="1.2" opacity="0.55"/>`);
  }
  for (const e of data.edges) {
    if (e.type === "hbond") {
      const eid = `h_${slug(e.ra)}_${e.a}__${slug(e.rb)}_${e.b}`;
      parts.push(`<line class="edge hbond" id="${eid}" x1="0" y1="0" x2="0" y2="0" stroke="#1b8e5a" stroke-width="2.4" stroke-dasharray="6,4" opacity="0.95"/>`);
      parts.push(`<text class="edgeLabel" id="${eid}_t" x="0" y="0" font-size="14" fill="#1b8e5a" text-anchor="middle" dominant-baseline="central"></text>`);
    } else if (e.type === "disulphide") {
      const eid = `d_${slug(e.ra)}_${e.a}__${slug(e.rb)}_${e.b}`;
      parts.push(`<line class="edge disulphide" id="${eid}" x1="0" y1="0" x2="0" y2="0" stroke="${DISULPHIDE_COLOR}" stroke-width="2.6" stroke-dasharray="6,4" opacity="0.98"/>`);
    }
  }

  for (const [rid, r] of Object.entries(data.resData)) {
    const gid = `res_${slug(rid)}`;
    const focus = !!r.focus;
    const label = r.label;
    const cls = r.cls;
    const res3 = r.res3;
    const [fill, stroke] = classColors(cls);
    const x = r.x;
    const y = r.y;
    const chain = r.chain;
    parts.push(`<g class="res ${focus ? "focus" : "simple"}" id="${gid}" data-res="${esc(rid)}" data-chain="${esc(chain)}" data-cls="${esc(cls)}" data-res3="${esc(res3)}" transform="translate(${x.toFixed(2)},${y.toFixed(2)})">`);
    if (focus) {
      parts.push(`<g class="atomBlock" id="atomblock_${slug(rid)}">`);
      for (const [a, b, order] of (r.bonds || [])) {
        const da = r.atoms[a];
        const db = r.atoms[b];
        if (!da || !db) continue;
        const width2 = order !== "1" ? 2.6 : 2.0;
        parts.push(`<line class="bond" x1="${da.dx.toFixed(2)}" y1="${da.dy.toFixed(2)}" x2="${db.dx.toFixed(2)}" y2="${db.dy.toFixed(2)}" stroke="#333" stroke-width="${width2}" stroke-linecap="round" opacity="0.95"/>`);
      }
      for (const [idx, ainfo] of Object.entries(r.atoms || {})) {
        const ax = ainfo.dx;
        const ay = ainfo.dy;
        const el = String(ainfo.el || "").toUpperCase();
        const name = String(ainfo.name || "").toUpperCase();
        const base = atomColor(el);
        const col = overrideAtomColor(res3, name, base);
        parts.push(`<circle class="atom" data-atom="${esc(idx)}" data-el="${esc(el)}" data-name="${esc(name)}" cx="${ax.toFixed(2)}" cy="${ay.toFixed(2)}" r="5.3" fill="${col}" stroke="#fff" stroke-width="1.3"/>`);
        const txt = cfg.atom_label_mode === "atomname" ? name : el;
        if (cfg.show_atom_labels_for_all || ["O","N","S","P"].includes(el)) {
          const t2 = txt.length > 4 ? txt.slice(0,4) : txt;
          parts.push(`<text class="atomLabel" x="${(ax + 8).toFixed(2)}" y="${(ay - 6).toFixed(2)}" font-size="11" fill="${col}">${esc(t2)}</text>`);
        }
      }
      parts.push(`<circle class="center" cx="0" cy="0" r="7.0" fill="${fill}" opacity="0.22"/>`);
      parts.push(`</g>`);
      parts.push(`<text class="resLabel" x="0" y="-40" font-size="18" font-weight="900" fill="${stroke}" text-anchor="middle">${esc(label)}</text>`);
    } else {
      parts.push(`<circle class="node" cx="0" cy="0" r="${cfg.simple_r.toFixed(1)}" fill="${fill}" fill-opacity="0.22" stroke="${stroke}" stroke-width="2"/>`);
      parts.push(`<text class="nodeLabel" x="0" y="0" font-size="12" fill="${stroke}" text-anchor="middle" dominant-baseline="central">${esc(label)}</text>`);
    }
    parts.push(`</g>`);
  }
  return parts.join("\n");
}

function generateViewerHtml(data) {
  return VIEWER_TEMPLATE
    .replace("__BOUNDARY_Y__", data.boundaryY.toFixed(3))
    .replace("__RES_JSON__", JSON.stringify(data.resData))
    .replace("__EDGES_JSON__", JSON.stringify(data.edges))
    .replace("__SVG_CONTENT__", buildSvgContent(data));
}


function settleFrameView(frame) {
  if (!frame) return;
  const run = () => {
    try {
      const doc = frame.contentDocument;
      const win = frame.contentWindow;
      if (!doc || !win) return;

      const btn = doc.getElementById('btnSaveHtml');
      if (btn && btn.parentNode) btn.parentNode.removeChild(btn);

      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          try { if (typeof win.syncViewportSize === 'function') win.syncViewportSize(); } catch (e) {}
          try { if (typeof win.fitViewToResidues === 'function') win.fitViewToResidues(); } catch (e) {}
          try { if (typeof win.applyView === 'function') win.applyView(); } catch (e) {}
          try { if (typeof win.updateAllEdges === 'function') win.updateAllEdges(); } catch (e) {}
        });
      });
    } catch (e) {}
  };
  frame.addEventListener('load', run, { once: true });
}

function detectViewerHtmlKind(html) {
  if (/name=["']2dppiviewer-origin["']\s+content=["']web-app["']/i.test(html)) return 'web-app';
  if (/name=["']2dppiviewer-origin["']\s+content=["']web-viewer["']/i.test(html)) return 'web-viewer';
  if (/id=["']btnTheme["']/i.test(html) && /id=["']btnAA["']/i.test(html) && /localStorage\s*\./.test(html)) return 'python-viewer';
  if (/id=["']btnTheme["']/i.test(html) && /id=["']btnAA["']/i.test(html)) return 'viewer-html';
  return 'html';
}

function patchPythonViewerHtml(html) {
  if (detectViewerHtmlKind(html) !== 'python-viewer') return html;

  const meta = '<meta name="2dppiviewer-origin" content="python-viewer"/>';
  const shim = [
    '<script>',
    '(function(){',
    '  function createMemoryStorage(){',
    '    const store = Object.create(null);',
    '    return {',
    '      getItem(key){ return Object.prototype.hasOwnProperty.call(store, key) ? store[key] : null; },',
    '      setItem(key, value){ store[key] = String(value); },',
    '      removeItem(key){ delete store[key]; },',
    '      clear(){ for (const key in store) delete store[key]; }',
    '    };',
    '  }',
    '  try {',
    '    const probe = "__2dppiviewer_probe__";',
    '    window.localStorage.setItem(probe, probe);',
    '    window.localStorage.removeItem(probe);',
    '  } catch (e) {',
    '    const fallback = createMemoryStorage();',
    '    try { Object.defineProperty(window, "localStorage", { configurable: true, value: fallback }); } catch (err) {',
    '      try { window.localStorage = fallback; } catch (err2) {}',
    '    }',
    '  }',
    '})();',
    '<\/script>'
  ].join('');

  if (/<head[^>]*>/i.test(html)) {
    return html.replace(/<head[^>]*>/i, function(match){ return match + meta + shim; });
  }
  return meta + shim + html;
}

function showFrame(html, baseName, options) {
  const opts = Object.assign({ postProcess: true, useSrcdoc: false }, options || {});
  const frameWrap = document.getElementById("frameWrap");
  const dropHint = document.getElementById("dropHint");
  const frame = document.getElementById("iframe");

  frameWrap.classList.remove("hidden");
  dropHint.classList.add("hidden");

  try { frame.removeAttribute('srcdoc'); } catch (e) {}
  try { frame.src = 'about:blank'; } catch (e) {}
  if (currentBlobUrl) {
    try { URL.revokeObjectURL(currentBlobUrl); } catch (e) {}
    currentBlobUrl = null;
  }

  if (opts.postProcess) settleFrameView(frame);

  if (opts.useSrcdoc) {
    frame.srcdoc = html;
  } else {
    currentBlobUrl = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
    frame.src = currentBlobUrl;
  }

  frame.dataset.baseName = baseName || "2DPPIViewer";
  currentViewerHtml = html;
}

async function handleFile(file) {
  if (!file) return;
  const name = file.name.replace(/\.(drw|html)$/i, "") || "2DPPIViewer";

  if (/\.html?$/i.test(file.name)) {
    const rawHtml = await file.text();
    const kind = detectViewerHtmlKind(rawHtml);
    const html = kind === 'python-viewer' ? patchPythonViewerHtml(rawHtml) : rawHtml;
    showFrame(html, name, { postProcess: false, useSrcdoc: true });
    setStatus("Loaded HTML (" + kind + "): " + file.name);
    return;
  }

  setStatus("Parsing " + file.name + " ...");
  const text = await file.text();
  const parsed = parseDrwText(text);
  if (!parsed.residues.length) {
    throw new Error("No residues were parsed from this .drw file");
  }
  const data = computeViewerData(parsed, DEFAULTS);
  const html = generateViewerHtml(data);
  showFrame(html, name, { postProcess: true, useSrcdoc: false });
  setStatus("Loaded: " + file.name);
}

function saveCurrentHtml() {
  const frame = document.getElementById("iframe");
  let html = currentViewerHtml;
  try {
    const win = frame.contentWindow;
    if (win && typeof win.makeSnapshotHtml === "function") {
      html = win.makeSnapshotHtml();
    }
  } catch (e) {}
  if (!html) {
    setStatus("Nothing to save");
    return;
  }
  const base = frame.dataset.baseName || "2DPPIViewer";
  const a = document.createElement("a");
  a.href = URL.createObjectURL(new Blob([html], { type: "text/html;charset=utf-8" }));
  a.download = base + ".html";
  document.body.appendChild(a);
  a.click();
  a.remove();
}

function exportCurrentSvg() {
  const frame = document.getElementById("iframe");
  try {
    const win = frame.contentWindow;
    if (win && typeof win.downloadSvg === "function") {
      win.downloadSvg((frame.dataset.baseName || "2DPPIViewer") + ".svg");
      return;
    }
    if (win && win.document) {
      const btn = win.document.getElementById("btnExport");
      if (btn) {
        btn.click();
        return;
      }
    }
  } catch (e) {}
  setStatus("Open a viewer first");
}

function wireDrop() {
  const root = document.body;
  ["dragenter", "dragover"].forEach(type => {
    root.addEventListener(type, e => {
      e.preventDefault();
      e.stopPropagation();
    });
  });
  ["dragleave", "drop"].forEach(type => {
    root.addEventListener(type, e => {
      e.preventDefault();
      e.stopPropagation();
    });
  });
  root.addEventListener("drop", async e => {
    const file = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (!file) return;
    try {
      await handleFile(file);
    } catch (err) {
      console.error(err);
      setStatus("Error: " + (err && err.message ? err.message : String(err)));
    }
  });
}

window.addEventListener("DOMContentLoaded", () => {
  const fileInput = document.getElementById("fileOpen");
  const open = () => fileInput.click();
  document.getElementById("btnOpen").addEventListener("click", open);
  document.getElementById("btnOpen2").addEventListener("click", open);
  document.getElementById("btnSave").addEventListener("click", saveCurrentHtml);
  fileInput.addEventListener("change", async () => {
    const file = fileInput.files && fileInput.files[0];
    fileInput.value = "";
    if (!file) return;
    try {
      await handleFile(file);
    } catch (err) {
      console.error(err);
      setStatus("Error: " + (err && err.message ? err.message : String(err)));
    }
  });
  wireDrop();
  window.addEventListener("resize", () => {
    const frame = document.getElementById("iframe");
    const wrap = document.getElementById("frameWrap");
    if (!frame || !wrap || wrap.classList.contains("hidden")) return;
    try {
      const win = frame.contentWindow;
      if (!win) return;
      const apply = () => {
        try { if (typeof win.syncViewportSize === "function") win.syncViewportSize(); } catch (e) {}
        try { if (typeof win.updateAllEdges === "function") win.updateAllEdges(); } catch (e) {}
      };
      if (typeof win.requestAnimationFrame === "function") {
        win.requestAnimationFrame(() => win.requestAnimationFrame(apply));
      } else {
        setTimeout(apply, 30);
      }
    } catch (e) {}
  });
});
